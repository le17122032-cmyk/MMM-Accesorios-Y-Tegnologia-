<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Accesorios y Tecnologia </title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TechAccess</h1>
    <nav>
      <a href="productos.html">Productos</a>
      <button onclick="location.href='login.html'">Iniciar Sesión</button>
      <button onclick="location.href='registro.html'">Registrarse</button>
      <button onclick="location.href='admin-login.html'">Admin</button>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Los mejores accesorios tech al mejor precio</h2>
      <p>Envíos locales en Aguascalientes</p>
    </div>
  </section>

  <div class="container">
    <h2>Productos Destacados</h2>
    <div class="product-grid" id="destacados"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function mostrarDestacados() {
      const productos = obtenerProductos().slice(0, 4);
      const container = document.getElementById('destacados');
      container.innerHTML = '';
      
      productos.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio.toLocaleString('es-MX')}</p>
            <button onclick="alert('✅ ${p.nombre} agregado al carrito (demo)')">Agregar al carrito</button>
          </div>
        `;
      });
    }
    mostrarDestacados();
  </script>
</body>
</html>
