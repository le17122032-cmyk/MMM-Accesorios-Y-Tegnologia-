<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Tecnología y Accesorios</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <header>
    <h1>MMM Accesorios y Tegnologia</h1>
    <nav>
      <a href="productos.html">Productos</a>
      <button onclick="location.href='login.html'">Iniciar Sesión</button>
      <button onclick="location.href='registro.html'">Registrarse</button>
      <button onclick="location.href='admin-login.html'">Admin</button>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Los mejores accesorios tech en Aguascalientes</h2>
      <p>Calidad • Precio • Garantía</p>
    </div>
  </section>

  <div class="container">
    <h2>Productos Destacados</h2>
    <div class="product-grid" id="destacados"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function mostrarDestacados() {
      const productos = obtenerProductos().slice(0, 6);
      const container = document.getElementById('destacados');
      container.innerHTML = '';

      productos.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio.toLocaleString('es-MX')}</p>
            <p style="padding:0 18px 10px; font-size:0.9rem; color:#bbb; min-height:60px;">
              ${p.descripcion ? p.descripcion.substring(0, 80) + '...' : ''}
            </p>
            <button onclick="agregarAlCarrito(${p.id})">Agregar al carrito</button>
          </div>
        `;
      });
    }

    function agregarAlCarrito(id) {
      alert("✅ Producto agregado al carrito (Funcionalidad completa próximamente)");
    }

    // Cargar productos al iniciar
    mostrarDestacados();
  </script>
</body>
</html>
