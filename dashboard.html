<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta - TechAccess</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TechAccess</h1>
    <nav>
      <a href="productos.html">Productos</a>
      <button onclick="logout()" class="logout-btn">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container dashboard-container">
    <h2>Bienvenido, <span id="nombreUsuario"></span></h2>
    <p>Esta es tu cuenta de cliente.</p>
    <hr>
    <button onclick="alert('Funcionalidad de pedidos en desarrollo')">Ver mis pedidos</button>
    <button onclick="location.href='productos.html'">Ir a comprar</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    const usuario = JSON.parse(localStorage.getItem('usuarioActual'));
    if (!usuario || usuario.tipo !== "cliente") {
      window.location.href = 'login.html';
    } else {
      document.getElementById('nombreUsuario').textContent = usuario.nombre;
    }
  </script>
</body>
</html>
