<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - TechAccess</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TechAccess - Admin</h1>
    <nav>
      <a href="productos.html">Ver Tienda</a>
      <button onclick="logout()" class="logout-btn">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <h2>Agregar Nuevo Producto</h2>
    
    <div class="login-container" style="max-width: 700px; margin-bottom: 40px;">
      <form id="formProducto">
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="number" id="precio" placeholder="Precio en MXN" step="0.01" required>
        <input type="text" id="categoria" placeholder="Categoría (Audio, Carga, Periféricos...)" required>
        
        <textarea id="descripcion" rows="5" placeholder="Descripción completa del producto" required></textarea>
        
        <label style="color:#d4af37; margin-top:10px; display:block;">Imagen del producto:</label>
        <input type="file" id="imagen" accept="image/*" required style="background:#1e1e1e; padding:10px;">
        
        <button type="submit">Guardar Producto</button>
      </form>
    </div>

    <h2>Productos Existentes (<span id="contador">0</span>)</h2>
    <div class="product-grid" id="listaProductos"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Verificar permiso de admin
    const usuario = JSON.parse(localStorage.getItem('usuarioActual'));
    if (!usuario || usuario.tipo !== "admin") {
      window.location.href = 'admin-login.html';
    }

    // Guardar nuevo producto
    document.getElementById('formProducto').onsubmit = function(e) {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const precio = parseFloat(document.getElementById('precio').value);
      const categoria = document.getElementById('categoria').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      const archivo = document.getElementById('imagen').files[0];

      if (!archivo) {
        alert("❌ Debes seleccionar una imagen");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(event) {
        let productos = JSON.parse(localStorage.getItem('productos')) || [];

        productos.push({
          id: Date.now(),
          nombre,
          precio,
          categoria,
          descripcion,
          img: event.target.result
        });

        localStorage.setItem('productos', JSON.stringify(productos));
        
        alert("✅ Producto guardado correctamente");
        document.getElementById('formProducto').reset();
        mostrarProductosAdmin();
      };
      reader.readAsDataURL(archivo);
    };

    // Mostrar productos en admin
    function mostrarProductosAdmin() {
      const productos = JSON.parse(localStorage.getItem('productos')) || [];
      const container = document.getElementById('listaProductos');
      const contador = document.getElementById('contador');
      
      contador.textContent = productos.length;
      container.innerHTML = '';

      if (productos.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#888;">No hay productos aún</p>';
        return;
      }

      productos.forEach((p, index) => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio.toLocaleString('es-MX')}</p>
            <p><strong>${p.categoria}</strong></p>
            <p style="font-size:0.85rem; color:#bbb; margin:8px 0;">${p.descripcion.substring(0, 90)}...</p>
            <button onclick="eliminarProducto(${index})" style="background:#c0392b; margin-top:8px;">Eliminar</button>
          </div>
        `;
      });
    }

    // Eliminar producto
    window.eliminarProducto = function(index) {
      if (confirm("¿Eliminar este producto?")) {
        let productos = JSON.parse(localStorage.getItem('productos')) || [];
        productos.splice(index, 1);
        localStorage.setItem('productos', JSON.stringify(productos));
        mostrarProductosAdmin();
      }
    };

    // Cargar al iniciar
    mostrarProductosAdmin();
  </script>
</body>
</html>
