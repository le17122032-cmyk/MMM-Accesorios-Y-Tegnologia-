<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TechAccess - Admin</h1>
    <nav>
      <button onclick="logout()" class="logout-btn">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container dashboard-container">
    <h2>Panel de Administración</h2>
    <p>Bienvenido, Administrador</p>
    <hr>
    <button onclick="alert('Gestión de productos (CRUD) - Próximamente')">Gestionar Productos</button>
    <button onclick="alert('Ver pedidos de clientes - Próximamente')">Ver Pedidos</button>
    <button onclick="alert('Gestionar usuarios - Próximamente')">Gestionar Usuarios</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    const usuario = JSON.parse(localStorage.getItem('usuarioActual'));
    if (!usuario || usuario.tipo !== "admin") {
      window.location.href = 'admin-login.html';
    }
  </script>
</body>
</html>
