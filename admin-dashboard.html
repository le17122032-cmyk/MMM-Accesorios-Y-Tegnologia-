<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - TechAccess</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <div class="container" style="margin-top: 50px;">
    <h2>🔍 Diagnóstico de Acceso</h2>
    
    <script src="js/app.js"></script>
    <script>
      console.clear();
      console.log("🚀 Iniciando diagnóstico...");

      const usuarioStr = localStorage.getItem('usuarioActual');
      console.log("Datos en localStorage:", usuarioStr);

      if (!usuarioStr) {
        document.body.innerHTML += `<h3 style="color:red;">❌ No hay sesión guardada</h3>`;
        alert("No hay sesión. Regresa a admin-login.html");
        window.location.href = 'admin-login.html';
      } else {
        const usuario = JSON.parse(usuarioStr);
        console.log("Usuario encontrado:", usuario);

        if (usuario.tipo === "admin") {
          document.body.innerHTML += `
            <h2 style="color:#d4af37;">✅ Bienvenido, ${usuario.nombre} (Admin)</h2>
            <p>Acceso concedido correctamente.</p>
            <button onclick="logout()">Cerrar Sesión</button>
          `;
        } else {
          document.body.innerHTML += `<h3 style="color:red;">❌ No eres administrador</h3>`;
        }
      }
    </script>
  </div>
</body>
</html>
