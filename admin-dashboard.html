<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - TechAccess</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <header>
    <h1>TechAccess - Admin</h1>
    <nav>
      <a href="productos.html">Ver Tienda</a>
      <button onclick="logout()" class="logout-btn">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <h2>👨‍💼 Panel de Administración</h2>

    <script src="js/app.js"></script>
    <script>
      // === DEPURACIÓN ===
      console.log("=== Intentando acceder a Admin Dashboard ===");
      
      const usuarioActual = localStorage.getItem('usuarioActual');
      console.log("Dato en localStorage:", usuarioActual);

      let usuario = null;
      if (usuarioActual) {
        usuario = JSON.parse(usuarioActual);
        console.log("Usuario detectado:", usuario);
      }

      if (!usuario || usuario.tipo !== "admin") {
        console.log("Acceso denegado - No es admin o no hay sesión");
        alert("Acceso denegado. Debes iniciar sesión como administrador.");
        window.location.href = 'admin-login.html';
      } else {
        console.log("✅ Acceso permitido como Admin");
        document.write(`<p style="color:green; font-size:20px;">Bienvenido, ${usuario.nombre} 👑</p>`);
      }
    </script>

    <!-- El resto del panel solo se muestra si es admin -->
    <div id="panelAdmin" style="display:none;">
      <h2>Agregar Nuevo Producto</h2>
      <!-- Aquí irá el formulario... (te lo doy completo después) -->
    </div>
  </div>
</body>
</html>
