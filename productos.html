<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - TechAccess</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <header>
    <h1>TechAccess</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <button onclick="location.href='login.html'">Iniciar Sesión</button>
      <button onclick="logout()">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <h1>Todos los Productos</h1>
    <div class="product-grid" id="todosProductos"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function mostrarTodos() {
      const productos = obtenerProductos();
      const container = document.getElementById('todosProductos');
      container.innerHTML = '';
      
      productos.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio.toLocaleString('es-MX')}</p>
            <button onclick="alert('✅ ${p.nombre} agregado al carrito (demo)')">Agregar al carrito</button>
          </div>
        `;
      });
    }
    mostrarTodos();
  </script>
</body>
</html>
