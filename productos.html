<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - TechAccess</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>TechAccess</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <button onclick="location.href='login.html'">Iniciar Sesión</button>
      <button onclick="logout()">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <h1>Todos los Productos</h1>
    <div class="product-grid" id="todosProductos"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function mostrarProductos() {
      const productos = obtenerProductos();
      const container = document.getElementById('todosProductos');
      container.innerHTML = '';

      if (productos.length === 0) {
        container.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px;">No hay productos aún. El administrador puede agregarlos.</p>';
        return;
      }

      productos.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img || 'https://via.placeholder.com/300'}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio ? p.precio.toLocaleString('es-MX') : '0'}</p>
            <button onclick="alert('Producto agregado al carrito (demo)')">Agregar al carrito</button>
          </div>
        `;
      });
    }
    mostrarProductos();
  </script>
</body>
</html>
