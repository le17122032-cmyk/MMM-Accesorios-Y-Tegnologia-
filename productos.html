<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <header>
    <h1>TechAccess</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <button onclick="location.href='login.html'">Iniciar Sesión</button>
      <button onclick="logout()">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <h1>Todos los Productos</h1>
    <div class="product-grid" id="todosProductos"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function mostrarTodosLosProductos() {
      const productos = obtenerProductos();
      const container = document.getElementById('todosProductos');
      container.innerHTML = '';

      if (productos.length === 0) {
        container.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:#888;">No hay productos disponibles aún.</p>';
        return;
      }

      productos.forEach(p => {
        container.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p class="precio">$${p.precio.toLocaleString('es-MX')}</p>
            <p style="padding:0 18px 15px; font-size:0.92rem; color:#ccc; min-height:70px;">
              ${p.descripcion ? p.descripcion.substring(0, 110) + '...' : 'Producto de calidad premium'}
            </p>
            <button onclick="agregarAlCarrito(${p.id})">Agregar al carrito</button>
          </div>
        `;
      });
    }

    function agregarAlCarrito(id) {
      alert("✅ Producto agregado al carrito (Funcionalidad completa próximamente)");
    }

    // Cargar productos
    mostrarTodosLosProductos();
  </script>
</body>
</html>
